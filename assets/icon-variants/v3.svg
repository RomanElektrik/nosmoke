<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg3" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#F0F9FF"/>
      <stop offset="1" stop-color="#7DD3FC"/>
    </linearGradient>
    <radialGradient id="core" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#0EA5E9"/>
      <stop offset="1" stop-color="#0284C7"/>
    </radialGradient>
  </defs>
  <rect width="1024" height="1024" fill="url(#bg3)"/>
  <g transform="translate(512 512)">
    <circle r="380" fill="none" stroke="#0EA5E9" stroke-width="6" opacity="0.15"/>
    <circle r="300" fill="none" stroke="#0EA5E9" stroke-width="8" opacity="0.25"/>
    <circle r="220" fill="none" stroke="#0EA5E9" stroke-width="10" opacity="0.4"/>
    <circle r="140" fill="none" stroke="#0EA5E9" stroke-width="12" opacity="0.6"/>
    <circle r="80" fill="url(#core)"/>
    <!-- Маленькие точки воздуха вокруг -->
    <circle cx="0" cy="-180" r="14" fill="#fff" opacity="0.9"/>
    <circle cx="155" cy="-90" r="10" fill="#fff" opacity="0.8"/>
    <circle cx="155" cy="90" r="10" fill="#fff" opacity="0.8"/>
    <circle cx="0" cy="180" r="14" fill="#fff" opacity="0.9"/>
    <circle cx="-155" cy="90" r="10" fill="#fff" opacity="0.8"/>
    <circle cx="-155" cy="-90" r="10" fill="#fff" opacity="0.8"/>
  </g>
</svg>
