<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg5" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#22D3EE"/>
      <stop offset="1" stop-color="#0E7490"/>
    </linearGradient>
    <radialGradient id="ring" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0.85" stop-color="#fff" stop-opacity="0"/>
      <stop offset="1" stop-color="#fff" stop-opacity="0.4"/>
    </radialGradient>
  </defs>
  <rect width="1024" height="1024" fill="url(#bg5)"/>
  <!-- Внешнее тонкое кольцо -->
  <circle cx="512" cy="512" r="380" fill="none" stroke="#fff" stroke-width="6" opacity="0.25"/>
  <!-- Главное толстое кольцо (progress 75%) -->
  <circle cx="512" cy="512" r="320" fill="none" stroke="#fff" stroke-width="40" stroke-linecap="round" stroke-dasharray="1500 2010" stroke-dashoffset="-150" transform="rotate(-90 512 512)" opacity="0.95"/>
  <!-- Центральный заполненный круг -->
  <circle cx="512" cy="512" r="240" fill="#fff"/>
  <!-- Галочка -->
  <path d="M 380 520 L 470 610 L 660 410" stroke="#0E7490" stroke-width="64" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
