<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#FFEDD5"/>
      <stop offset="1" stop-color="#FDBA74"/>
    </linearGradient>
    <linearGradient id="heart" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FB7185"/>
      <stop offset="1" stop-color="#E11D48"/>
    </linearGradient>
  </defs>
  <rect width="1024" height="1024" fill="url(#bg2)"/>
  <g transform="translate(512 512)">
    <!-- Левое лёгкое (упрощённо, с разветвлениями) -->
    <path d="M -60 -40 C -200 -60 -340 80 -320 240 C -310 340 -250 380 -180 380 C -120 380 -80 340 -70 280 L -60 -40 Z" fill="url(#heart)" opacity="0.85"/>
    <!-- Правое лёгкое -->
    <path d="M 60 -40 C 200 -60 340 80 320 240 C 310 340 250 380 180 380 C 120 380 80 340 70 280 L 60 -40 Z" fill="url(#heart)" opacity="0.85"/>
    <!-- Сердце по центру (форма из двух кругов и треугольника) -->
    <path d="M 0 -180 C -80 -260 -200 -240 -200 -120 C -200 -40 -100 60 0 180 C 100 60 200 -40 200 -120 C 200 -240 80 -260 0 -180 Z" fill="url(#heart)"/>
    <!-- Трахея/бронхи -->
    <line x1="0" y1="-260" x2="0" y2="-180" stroke="#9F1239" stroke-width="20" stroke-linecap="round"/>
    <line x1="0" y1="-180" x2="-60" y2="-40" stroke="#9F1239" stroke-width="14" stroke-linecap="round"/>
    <line x1="0" y1="-180" x2="60" y2="-40" stroke="#9F1239" stroke-width="14" stroke-linecap="round"/>
    <!-- Световой блик на сердце -->
    <ellipse cx="-60" cy="-100" rx="50" ry="30" fill="#fff" opacity="0.35" transform="rotate(-30 -60 -100)"/>
  </g>
</svg>
